name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Робот сработает только тогда, когда ты пушишь в main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Папка, которую Vite создает после сборки
          branch: gh-pages # Куда закидывать готовый сайт